<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pi Stream - Testnet</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="font-family:Arial;text-align:center;padding:40px">
  <h1>🎬 Pi Stream</h1>
  <p>Testnet Demo - No real Pi used</p>
  
  <button onclick="login()" style="padding:15px 30px;background:#6f42c1;color:white;border:none;border-radius:8px;font-size:18px">
    Authenticate with Pi
  </button>
  
  <p id="user" style="margin-top:20px;font-weight:bold"></p>

<script>
  Pi.init({ version: "2.0", sandbox: true });
  
  async function login() {
    try {
      const auth = await Pi.authenticate(['username'], onIncompletePaymentFound);
      document.getElementById('user').innerText = 'Welcome @' + auth.user.username;
    } catch(e) {
      alert('Open in Pi Browser');
    }
  }
  
  function onIncompletePaymentFound(p) {}
</script>
</body>
</html>
