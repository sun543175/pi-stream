<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamPi - Pi Network</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{margin:0;background:#141414;color:white;font-family:Arial}
.header{padding:20px;background:linear-gradient(180deg,#000 0%,transparent 100%);display:flex;justify-content:space-between;align-items:center}
.logo{color:#e50914;font-size:28px;font-weight:bold}
.btn{background:#e50914;color:white;border:none;padding:10px 20px;border-radius:4px;font-weight:bold}
.hero{height:60vh;background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.8)),url('https://images.unsplash.com/photo-1485846234645-a62644f84728');background-size:cover;display:flex;align-items:end;padding:40px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px}
.card{background:#222;border-radius:8px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.card-body{padding:10px}
.pay-btn{width:100%;background:#6f42c1;color:white;border:none;padding:8px;border-radius:4px;margin-top:5px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">STREAMPI</div>
  <button class="btn" id="loginBtn" onclick="login()">Sign In with Pi</button>
  <span id="user" style="display:none"></span>
</div>

<div class="hero">
  <div>
    <h1>Unlimited Movies with Pi</h1>
    <p>Watch anywhere. Pay with Pi. Testnet Demo.</p>
    <button class="btn" onclick="login()">Start Watching</button>
  </div>
</div>

<h2 style="padding:0 20px">Trending Now</h2>
<div class="grid">
  <div class="card"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1"><div class="card-body"><b>Action Thriller</b><button class="pay-btn" onclick="pay('Action')">Unlock - 1π</button></div></div>
  <div class="card"><img src="https://images.unsplash.com/photo-1509347528160-9a9e33742cdb"><div class="card-body"><b>Sci-Fi Series</b><button class="pay-btn" onclick="pay('SciFi')">Unlock - 1π</button></div></div>
  <div class="card"><img src="https://images.unsplash.com/photo-1574267432553-4b4628081c31"><div class="card-body"><b>Comedy Hit</b><button class="pay-btn" onclick="pay('Comedy')">Unlock - 1π</button></div></div>
  <div class="card"><img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf"><div class="card-body"><b>Drama</b><button class="pay-btn" onclick="pay('Drama')">Unlock - 1π</button></div></div>
  <div class="card"><img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0"><div class="card-body"><b>Horror</b><button class="pay-btn" onclick="pay('Horror')">Unlock - 1π</button></div></div>
  <div class="card"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728"><div class="card-body"><b>Documentary</b><button class="pay-btn" onclick="pay('Doc')">Unlock - 1π</button></div></div>
</div>

<script>
Pi.init({version:"2.0",sandbox:true});
async function login(){
  try{
    const auth=await Pi.authenticate(['username','payments'],()=>{});
    document.getElementById('loginBtn').style.display='none';
    document.getElementById('user').style.display='block';
    document.getElementById('user').innerText='@'+auth.user.username;
  }catch(e){alert('Open in Pi Browser')}
}
async function pay(movie){
  try{
    await Pi.createPayment({amount:1,memo:"StreamPi: "+movie,metadata:{movie}},{
      onReadyForServerApproval:id=>console.log(id),
      onReadyForServerCompletion:(id,tx)=>alert('✓ Unlocked '+movie+'! TX:'+id),
      onCancel:()=>{},onError:e=>alert(e)
    });
  }catch(e){alert('Login first')}
}
</script>
</body>
</html>
